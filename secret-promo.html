<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator Komentar Mandiri — NPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { poppins: ['Poppins', 'sans-serif'], }, colors: { darkblue: '#001f3f', navy: '#003366', cyan: '#00b4d8', ocean: '#0077b6', } } } }
    </script>
    <style>
        body { background: linear-gradient(135deg, #0b1120, #003366); background-attachment: fixed; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(0, 180, 216, 0.3); border-top: 4px solid #00b4d8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-poppins min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8 mt-4">
            <h1 class="text-3xl md:text-4xl font-bold text-cyan mb-2"><i class="fa-solid fa-comment-dots mr-2"></i> AI Komentar Mandiri</h1>
            <p class="text-gray-300 opacity-90 text-sm md:text-base">Style Tangerang: Simpel, No Basa-basi, Langsung CTA! 🤪</p>
        </div>

        <div class="glass-panel rounded-2xl p-6 md:p-8 mb-8 shadow-2xl">
            <div class="mb-5 bg-navy bg-opacity-40 p-3 rounded-xl border border-cyan border-opacity-30">
                <label class="block text-xs font-semibold mb-1 text-cyan">🔑 1. API Key Gemini (Tersimpan Otomatis)</label>
                <input type="password" id="apiKeyInput" placeholder="Masukkan API Key Anda..." class="w-full p-2 rounded-lg bg-darkblue bg-opacity-70 border border-gray-600 focus:border-cyan focus:outline-none text-white text-xs">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-cyan">🤖 2. Pilih Mesin Robot AI</label>
                <select id="aiModel" class="w-full p-3 rounded-xl bg-navy bg-opacity-50 border border-gray-600 focus:border-cyan focus:outline-none text-blue-300 font-semibold appearance-none">
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash (Cepat & Stabil)</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-cyan">🎯 3. Target Audiens</label>
                    <input type="text" id="targetInput" placeholder="Contoh: Karyawan, Emak-emak..." class="w-full p-3 rounded-xl bg-navy bg-opacity-50 border border-gray-600 focus:border-cyan focus:outline-none text-white placeholder-gray-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-cyan">🖼️ 4. Judul Hook (di Gambar)</label>
                    <input type="text" id="hookInput" placeholder="Contoh: 3 Cara Biar Dompet Nggak Tipis..." class="w-full p-3 rounded-xl bg-navy bg-opacity-50 border border-gray-600 focus:border-cyan focus:outline-none text-white placeholder-gray-400">
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-cyan">📖 5. Pesan Empati / Motivasi</label>
                <textarea id="storyInput" rows="2" placeholder="Contoh: Karyawan hebat itu bukan yang gajinya besar, tapi yang bisa kelola keuangan keluarga..." class="w-full p-3 rounded-xl bg-navy bg-opacity-50 border border-gray-600 focus:border-cyan focus:outline-none text-white placeholder-gray-400 resize-none"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2 text-cyan">🔗 6. Link CTA (Kolam Prospek)</label>
                <input type="text" id="linkInput" placeholder="Contoh: https://3ireborn.github.io/npa-funnel..." class="w-full p-3 rounded-xl bg-navy bg-opacity-50 border border-gray-600 focus:border-cyan focus:outline-none text-white placeholder-gray-400">
            </div>
            
            <button id="generateBtn" onclick="generateKomentar()" class="w-full bg-gradient-to-r from-cyan to-ocean hover:scale-[1.02] transform transition-all text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 text-lg">
                <span>🪄 Racik Komentar Simpel Sekarang</span>
            </button>

            <div id="loadingIndicator" class="hidden flex-col items-center justify-center mt-6">
                <div class="loader mb-3"></div>
                <p class="text-cyan animate-pulse font-medium text-center mt-3">Mencetak komentar simpel anti-ribet...</p>
            </div>
            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-500 bg-opacity-20 border border-red-500 rounded-xl text-red-200 text-center text-sm"></div>
        </div>

        <div id="resultsContainer" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-center text-white mb-2">Pilih Komentar Anda:</h2>
            
            <div class="glass-panel rounded-2xl p-5 md:p-6 border-l-4 border-l-blue-400 relative group">
                <button onclick="copyText('resStory')" class="absolute top-4 right-4 bg-gray-700 hover:bg-blue-500 text-white text-xs py-1.5 px-3 rounded font-semibold transition-colors z-10">Copy</button>
                <h3 class="text-lg font-bold mb-3 flex items-center gap-2"><span class="text-xl">📖</span> Opsi 1: Empati Halus</h3>
                <div class="bg-darkblue bg-opacity-60 p-4 rounded-xl">
                    <p id="resStory" class="text-gray-200 whitespace-pre-line text-sm md:text-base pr-12 font-medium"></p>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-5 md:p-6 border-l-4 border-l-yellow-400 relative group">
                <button onclick="copyText('resPoint')" class="absolute top-4 right-4 bg-gray-700 hover:bg-yellow-500 text-slate-900 text-xs py-1.5 px-3 rounded font-semibold transition-colors z-10">Copy</button>
                <h3 class="text-lg font-bold mb-3 flex items-center gap-2"><span class="text-xl">🔥</span> Opsi 2: Semangat Menggebu</h3>
                <div class="bg-darkblue bg-opacity-60 p-4 rounded-xl">
                    <p id="resPoint" class="text-gray-200 whitespace-pre-line text-sm md:text-base pr-12 font-medium"></p>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-5 md:p-6 border-l-4 border-l-green-400 relative group">
                <button onclick="copyText('resEdu')" class="absolute top-4 right-4 bg-gray-700 hover:bg-green-500 text-white text-xs py-1.5 px-3 rounded font-semibold transition-colors z-10">Copy</button>
                <h3 class="text-lg font-bold mb-3 flex items-center gap-2"><span class="text-xl">💡</span> Opsi 3: Edukatif Praktis</h3>
                <div class="bg-darkblue bg-opacity-60 p-4 rounded-xl">
                    <p id="resEdu" class="text-gray-200 whitespace-pre-line text-sm md:text-base pr-12 font-medium"></p>
                </div>
            </div>
        </div>

    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem('npa_tools_api_key')) document.getElementById('apiKeyInput').value = localStorage.getItem('npa_tools_api_key');
            if (localStorage.getItem('npa_tools_ai_model')) document.getElementById('aiModel').value = localStorage.getItem('npa_tools_ai_model');
        };

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            const tempTextArea = document.createElement("textarea"); tempTextArea.value = text; document.body.appendChild(tempTextArea);
            tempTextArea.select(); document.execCommand("copy"); document.body.removeChild(tempTextArea);
            const btn = document.querySelector(`#${elementId}`).previousElementSibling;
            const originalText = btn.innerText; btn.innerText = "Copied!"; btn.classList.add("bg-white", "text-darkblue");
            setTimeout(() => { btn.innerText = originalText; btn.classList.remove("bg-white", "text-darkblue"); }, 2000);
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage'); errDiv.innerText = msg; errDiv.classList.remove('hidden');
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('generateBtn').disabled = false; document.getElementById('generateBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        async function generateKomentar() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const aiModel = document.getElementById('aiModel').value;
            const target = document.getElementById('targetInput').value.trim();
            const hook = document.getElementById('hookInput').value.trim();
            const story = document.getElementById('storyInput').value.trim();
            const link = document.getElementById('linkInput').value.trim();

            if (!apiKey) return showError("Mohon masukkan API Key Gemini.");
            if (!target || !hook || !story || !link) return showError("Pastikan semua kolom sudah diisi, Komandan!");

            localStorage.setItem('npa_tools_api_key', apiKey);
            localStorage.setItem('npa_tools_ai_model', aiModel);

            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('resultsContainer').classList.add('hidden');
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('generateBtn').disabled = true; document.getElementById('generateBtn').classList.add('opacity-50', 'cursor-not-allowed');
            
            try {
                const prompt = `Anda adalah Pakde Sugiarto (NPA Smart System). Anda sedang menulis "Komentar Pertama" di postingan FB Anda sendiri. 

                Target Audiens: ${target}
                Judul Hook: "${hook}"
                Pesan Emosi: "${story}"
                Link: ${link}

                ATURAN MUTLAK FORMAT (WAJIB DIIKUTI PERSIS SEPERTI INI):
                Anda TIDAK BOLEH menjabarkan poin-poinnya. Cukup sebutkan kalimat pendek saja.
                
                CONTOH STRUKTUR YANG HARUS DITIRU:
                [Judul Hook]
                \\n\\n
                1. [Poin 1 sangat pendek, misal: Kurangi pengeluaran yang tidak perlu.]
                2. [Poin 2 sangat pendek, misal: Tambah sumber penghasilan.]
                3. [Poin 3 sangat pendek, misal: Bangun aset untuk masa depan keluarga.]
                \\n\\n
                [Kalimat dari Pesan Emosi]
                \\n\\n
                Di 3iReborn kami belajar bersama tentang cara mengelola keuangan keluarga, meningkatkan keterampilan, dan membuka peluang penghasilan tambahan secara bertahap.
                \\n\\n
                Kalau ingin tahu bagaimana konsepnya, silahkan di baca baca barangkali berjodoh 👇
                ${link}

                Keluarkan jawaban MURNI HANYA dalam format JSON di bawah ini (tanpa markdown tebal/bintang-bintang):
                {
                  "opsi_1": "Gunakan struktur persis seperti contoh di atas, poin sangat pendek TANPA penjelasan.",
                  "opsi_2": "Gunakan struktur persis seperti contoh di atas, berikan variasi kata sedikit lebih semangat, poin sangat pendek TANPA penjelasan.",
                  "opsi_3": "Gunakan struktur persis seperti contoh di atas, berikan variasi kata sedikit lebih edukatif, poin sangat pendek TANPA penjelasan."
                }`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "Terjadi kesalahan pada server AI Google.");

                let resultText = data.candidates[0].content.parts[0].text;
                const firstBrace = resultText.indexOf('{'); const lastBrace = resultText.lastIndexOf('}');
                if (firstBrace !== -1 && lastBrace !== -1) resultText = resultText.substring(firstBrace, lastBrace + 1);
                else throw new Error("Format AI salah.");

                const resultJson = JSON.parse(resultText);
                document.getElementById('resStory').innerText = resultJson.opsi_1;
                document.getElementById('resPoint').innerText = resultJson.opsi_2;
                document.getElementById('resEdu').innerText = resultJson.opsi_3;

                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('resultsContainer').classList.remove('hidden');
            } catch (error) {
                showError("Gagal: " + error.message);
            } finally {
                document.getElementById('generateBtn').disabled = false; document.getElementById('generateBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
